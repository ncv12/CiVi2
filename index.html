<div id="step-folder" class="hidden">
        <h2>📂 Tạo Thư Mục Thực Hành</h2>
        <p style="color:#4361ee">Chào bạn: <b id="user-display"></b></p>
        
        <label>Chọn biểu tượng đại diện (20 mẫu):</label>
        <div class="icon-box" id="icon-picker" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; font-size: 24px;">
            <span class="selected-icon" onclick="pickIcon('📁', this)">📁</span>
            <span onclick="pickIcon('🚀', this)">🚀</span>
            <span onclick="pickIcon('💻', this)">💻</span>
            <span onclick="pickIcon('⚙️', this)">⚙️</span>
            <span onclick="pickIcon('🔋', this)">🔋</span>
            <span onclick="pickIcon('💡', this)">💡</span>
            <span onclick="pickIcon('🔧', this)">🔧</span>
            <span onclick="pickIcon('📡', this)">📡</span>
            <span onclick="pickIcon('🧪', this)">🧪</span>
            <span onclick="pickIcon('🧬', this)">🧬</span>
            <span onclick="pickIcon('🤖', this)">🤖</span>
            <span onclick="pickIcon('🛰️', this)">🛰️</span>
            <span onclick="pickIcon('🔌', this)">🔌</span>
            <span onclick="pickIcon('🔬', this)">🔬</span>
            <span onclick="pickIcon('🛸', this)">🛸</span>
            <span onclick="pickIcon('🌍', this)">🌍</span>
            <span onclick="pickIcon('🌈', this)">🌈</span>
            <span onclick="pickIcon('🔥', this)">🔥</span>
            <span onclick="pickIcon('💎', this)">💎</span>
            <span onclick="pickIcon('🏆', this)">🏆</span>
        </div>

        <div class="input-group">
            <label>Tên thư mục (Nhóm/Tên):</label>
            <input type="text" id="folder-name" placeholder="Ví dụ: Nhóm 5 - Robot">
        </div>
        <button class="btn-create" onclick="createFolder()">Xác nhận gửi bài</button>
    </div>
